<body class="font-body bg-background text-on-surface min-h-screen flex flex-col ethereal-bg">
<main class="flex-grow flex items-center justify-center p-6 sm:p-12">
<div class="max-w-md w-full">
<!-- Branding Header -->
<div class="text-center mb-10">
<div class="inline-flex items-center justify-center mb-4">
<div class="w-12 h-12 rounded-xl signature-gradient flex items-center justify-center shadow-lg">
<span class="material-symbols-outlined text-white text-2xl" style="font-variation-settings: 'FILL' 1;">verified_user</span>
</div>
</div>
<h1 class="text-3xl font-black tracking-tighter text-on-surface mb-2">Nexus</h1>
<p class="text-on-surface-variant font-medium tracking-tight">The Automated Clearance Protocol</p>
</div>
<!-- Login Card -->
<div class="bg-surface-container-lowest rounded-[1.5rem] p-8 sm:p-10 ambient-shadow relative overflow-hidden">
<!-- Subtle Glass Decor -->
<div class="absolute -top-24 -right-24 w-48 h-48 bg-secondary-container/20 blur-3xl rounded-full"></div>
<div class="absolute -bottom-24 -left-24 w-48 h-48 bg-tertiary-container/20 blur-3xl rounded-full"></div>
<div class="relative z-10">
<h2 class="text-xl font-bold text-on-surface mb-8 tracking-tight">System Authentication</h2>
<!-- Role Toggle -->
<div class="bg-surface-container-low p-1.5 rounded-xl flex gap-1 mb-8">
<button class="flex-1 py-2 px-4 rounded-lg bg-surface-container-lowest text-on-primary-container text-sm font-bold shadow-sm flex items-center justify-center gap-2 transition-all">
<span class="material-symbols-outlined text-sm">school</span>
                            Student
                        </button>
<button class="flex-1 py-2 px-4 rounded-lg text-on-surface-variant text-sm font-medium hover:bg-surface-container/50 flex items-center justify-center gap-2 transition-all">
<span class="material-symbols-outlined text-sm">admin_panel_settings</span>
                            Admin
                        </button>
</div>
<form class="space-y-6">
<!-- Email Input -->
<div class="space-y-2">
<label class="text-[10px] uppercase font-bold tracking-[0.05em] text-on-surface-variant px-1">Institutional Identifier</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-lg">alternate_email</span>
</div>
<input class="block w-full pl-11 pr-4 py-4 bg-surface-container-low border-none rounded-xl text-on-surface placeholder:text-outline-variant focus:ring-2 focus:ring-primary/20 transition-all outline-none" placeholder="student.id@nexus.edu" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<div class="flex justify-between items-end px-1">
<label class="text-[10px] uppercase font-bold tracking-[0.05em] text-on-surface-variant">Access Protocol</label>
<a class="text-[10px] uppercase font-bold tracking-[0.05em] text-primary hover:text-secondary-dim transition-colors" href="#">Forgot Token?</a>
</div>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-lg">lock</span>
</div>
<input class="block w-full pl-11 pr-4 py-4 bg-surface-container-low border-none rounded-xl text-on-surface placeholder:text-outline-variant focus:ring-2 focus:ring-primary/20 transition-all outline-none" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Security Notice -->
<div class="flex items-center gap-3 p-4 bg-tertiary-container/20 rounded-xl">
<span class="material-symbols-outlined text-tertiary text-lg" style="font-variation-settings: 'FILL' 1;">shield</span>
<p class="text-xs text-on-tertiary-container font-medium leading-relaxed">
                                Encrypted session active. Your clearance data is protected by Registrar Protocol 4.2.
                            </p>
</div>
<!-- Submit Button -->
<button class="w-full py-4 px-6 signature-gradient text-white font-bold rounded-xl shadow-lg hover:brightness-110 active:scale-[0.98] transition-all flex items-center justify-center gap-3" type="submit">
                            Authenticate
                            <span class="material-symbols-outlined text-lg">login</span>
</button>
</form>
</div>
</div>
<!-- Footer Meta -->
<div class="mt-8 text-center">
<p class="text-xs text-on-surface-variant font-medium">
